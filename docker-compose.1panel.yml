version: "3.8"

services:
  stream-recorder:
    image: ghcr.io/asheblog/stream-recorder-web-ui:latest
    container_name: stream-recorder
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "file:/app/data/stream-recorder.db"
      NODE_ENV: production
      TZ: "${TZ:-Asia/Shanghai}"
    volumes:
      - "${APP_DATA_DIR:-./storage/data}:/app/data"
      - "${APP_VIDEOS_DIR:-./storage/videos}:/data/videos"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
