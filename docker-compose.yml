version: "3.8"
services:
  stream-recorder:
    build: .
    container_name: stream-recorder
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./data/app.db
      - PORT=3000
      - ENGINE_MODE=real
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./videos:/data/videos
